<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="A&M Construction"/>
<title>A&M Construction and Consulting</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#f2f2f0;min-height:100vh}
input,textarea,select{outline:none;font-family:Arial,sans-serif}
.page{display:none;padding:14px}.page.active{display:block}
.btn{display:inline-block;padding:10px 20px;border:none;border-radius:3px;cursor:pointer;font-family:Arial;font-size:13px;font-weight:bold;white-space:nowrap}
.btn-black{background:#000;color:#fff}.btn-green{background:#27ae60;color:#fff}
.btn-blue{background:#2980b9;color:#fff}.btn-red{background:#e74c3c;color:#fff}
.btn-orange{background:#e67e22;color:#fff}.btn-ghost{background:transparent;color:#888;border:1px solid #ddd}
.btn-sec{background:#fff;color:#000;border:1px solid #999}
.inp{width:100%;border:1px solid #ccc;padding:9px 11px;font-size:13px;border-radius:3px;background:#fff}
.lbl{display:block;font-size:10px;font-weight:bold;letter-spacing:1px;color:#555;text-transform:uppercase;margin-bottom:4px}
.card{background:#fff;border:1px solid #ddd;border-radius:3px;padding:12px 14px;margin-bottom:8px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;top:18px;right:18px;z-index:9999;padding:9px 16px;border-radius:3px;font-size:12px;font-weight:bold;color:#fff;max-width:320px;display:none}
.header{background:#000;padding:11px 14px;color:#fff}
.nav{background:#1a1a1a;display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:3px solid #27ae60}
.nav-btn{padding:9px 4px;background:transparent;border:none;cursor:pointer;color:#777;font-family:Arial;font-size:10px;font-weight:bold;text-align:center}
.nav-btn.active{background:#27ae60;color:#fff}
.sec-title{font-size:10px;font-weight:bold;letter-spacing:1px;color:#555;text-transform:uppercase;margin:12px 0 6px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-wrap{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9998;display:none;align-items:center;justify-content:center}
.spinner-wrap.show{display:flex}
.spinner-box{background:#fff;padding:26px 36px;border-radius:4px;text-align:center}
.spinner{width:36px;height:36px;border:3px solid #eee;border-top-color:#27ae60;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
.sig-canvas{border:2px dashed #27ae60;border-radius:3px;cursor:crosshair;touch-action:none;width:100%;background:#fafff8;display:block}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="spinner-wrap" id="spinner"><div class="spinner-box"><div class="spinner"></div><div id="spinMsg" style="font-size:13px;font-weight:bold">Working...</div></div></div>
<div class="header" id="header">
  <div class="row" style="justify-content:space-between">
    <div class="row" style="gap:9px">
      <button id="backBtn" class="btn btn-ghost" style="display:none;padding:4px 10px;font-size:11px;color:#aaa;border-color:#444" onclick="goBack()">← Back</button>
      <div><div style="font-size:13px;font-weight:bold;letter-spacing:.5px">A&M CONSTRUCTION AND CONSULTING</div><div id="headerSub" style="font-size:9px;color:#777"></div></div>
    </div>
    <div style="font-size:8px;color:#555">CSLB #1148491</div>
  </div>
</div>
<div class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showTab('home')"><div style="font-size:15px">🏠</div><div>Home</div></button>
  <button class="nav-btn" id="nav-upload" onclick="showTab('upload')"><div style="font-size:15px">⚡</div><div>Upload</div></button>
  <button class="nav-btn" id="nav-library" onclick="showTab('library')"><div style="font-size:15px">📚</div><div>Library</div></button>
</div>
<div class="page active" id="page-home">
  <div class="grid2" style="margin-bottom:12px">
    <div style="background:linear-gradient(135deg,#27ae60,#1e8449);border-radius:6px;padding:16px 13px;cursor:pointer;color:#fff" onclick="showTab('upload')">
      <div style="font-size:26px;margin-bottom:5px">⚡</div><div style="font-size:13px;font-weight:bold;margin-bottom:2px">Quick Upload</div>
      <div style="font-size:10px;opacity:.85">Facebook posts, sub bids, receipts</div><div id="libCount" style="font-size:9px;opacity:.65;margin-top:3px"></div>
    </div>
    <div style="background:linear-gradient(135deg,#2980b9,#1a5276);border-radius:6px;padding:16px 13px;cursor:pointer;color:#fff" onclick="showTab('library')">
      <div style="font-size:26px;margin-bottom:5px">📚</div><div style="font-size:13px;font-weight:bold;margin-bottom:2px">Price Library</div>
      <div style="font-size:10px;opacity:.85">Combined avg, CSLB rates</div><div id="rateCount" style="font-size:9px;opacity:.65;margin-top:3px"></div>
    </div>
  </div>
  <div id="pendingAlert" style="display:none" class="card" style="border:2px solid #e67e22;background:#fff3e0"></div>
  <div class="row" style="margin-bottom:10px">
    <input class="inp" id="projSearch" style="flex:1" placeholder="Search projects..." oninput="renderProjects()"/>
    <button class="btn btn-black" onclick="newProject()">+ New Project</button>
  </div>
  <div id="projectList"></div>
</div>
<div class="page" id="page-project"><div class="card" id="projInfo"></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:7px;margin-bottom:12px" id="projActions"></div><div id="projDocs"></div></div>
<div class="page" id="page-doc"><div id="docContent"></div></div>
<div class="page" id="page-fielddocs"><div id="fieldDocsContent"></div></div>
<div class="page" id="page-receipt">
  <div class="card" style="border:2px solid #e74c3c">
    <div class="lbl">🧾 Scan Receipt</div>
    <div style="font-size:11px;color:#888;margin-bottom:10px">AI reads every line, markup applied automatically</div>
    <div class="row" style="margin-bottom:12px"><span style="font-weight:bold;font-size:12px;color:#c0392b">Markup:</span><input type="number" id="rcptMarkup" value="25" style="width:54px;border:2px solid #e74c3c;text-align:center;padding:4px;font-size:14px;font-weight:bold;color:#e74c3c;border-radius:2px"/><span style="font-weight:bold;color:#e74c3c">%</span></div>
    <input type="file" id="rcptFile" accept="image/*" style="display:none" onchange="scanReceipt(this)"/>
    <button class="btn btn-red" style="padding:12px 24px" onclick="document.getElementById('rcptFile').click()">📷 Upload Receipt Photo</button>
  </div>
</div>
<div class="page" id="page-arcsite"><div id="arcsiteContent"></div></div>
<div class="page" id="page-upload"><div id="uploadContent"></div></div>
<div class="page" id="page-library"><div id="libraryContent"></div></div>
<script>
var S={projects:[],uploadedRates:{},refLib:[],screen:'home',activeProjId:null,activeDocType:null,activeDocId:null,docLines:[],docMarkup:25,docPaySched:'p3'};
function getP(){return S.projects.find(function(p){return p.id===S.activeProjId});}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ld(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function loadAll(){S.projects=ld('amf_p',[]);S.uploadedRates=ld('amf_r',{});S.refLib=ld('amf_l',[]);}
function spj(){sv('amf_p',S.projects);}function srj(){sv('amf_r',S.uploadedRates);}function slj(){sv('amf_l',S.refLib);}
function uid(){return Math.random().toString(36).slice(2,9);}
function tod(){return new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
function fd(n){if(!n||n===0)return'—';return n>=100?'$'+Math.round(n).toLocaleString():'$'+Number(n).toFixed(2);}
function fb(n){return'$'+Math.round(n||0).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.style.background=type==='err'?'#8b0000':'#1a4a1a';el.style.display='block';setTimeout(function(){el.style.display='none';},3500);}
function busy(show,msg){var el=document.getElementById('spinner');el.classList.toggle('show',show);if(msg)document.getElementById('spinMsg').textContent=msg;}
function tb64(file){return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result.split(',')[1]);};r.onerror=rej;r.readAsDataURL(file);});}
async function callAI(msgs,mt){var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:mt||2000,messages:msgs})});var d=await res.json();return(d.content||[]).map(function(c){return c.text||'';}).join('').replace(/```json|```/g,'').trim();}
function showScreen(name,sub){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById('page-'+name).classList.add('active');document.getElementById('backBtn').style.display=name==='home'?'none':'block';document.getElementById('headerSub').textContent=sub||'';['home','upload','library'].forEach(function(t){document.getElementById('nav-'+t).classList.toggle('active',t===name);});S.screen=name;}
function showTab(t){if(t==='home'){renderHome();showScreen('home','Home');}if(t==='upload'){renderUpload();showScreen('upload','⚡ Quick Upload');}if(t==='library'){renderLibrary();showScreen('library','📚 Price Library');}}
function goBack(){var s=S.screen;if(s==='upload'||s==='library')showTab('home');else if(s==='doc'||s==='fielddocs'||s==='receipt'||s==='arcsite')showProject();else showTab('home');}

var CSLB={'Drywall L4':{low:2.20,high:3.20,unit:'SF'},'Drywall L5':{low:2.80,high:4.00,unit:'SF'},'Framing Labor':{low:5.00,high:9.00,unit:'SF'},'Framing+Material':{low:12.00,high:20.00,unit:'SF'},'Paint Interior':{low:2.50,high:4.50,unit:'SF'},'Paint Exterior':{low:3.50,high:6.00,unit:'SF'},'Tile Floor':{low:10.00,high:18.00,unit:'SF'},'Tile Wall':{low:14.00,high:26.00,unit:'SF'},'Hardwood Floor':{low:10.00,high:20.00,unit:'SF'},'LVP':{low:5.00,high:10.00,unit:'SF'},'Cabinets Stock':{low:180,high:320,unit:'LF'},'Cabinets Semi-Custom':{low:320,high:700,unit:'LF'},'Countertop Quartz':{low:90,high:170,unit:'SF'},'Plumbing Rough-In':{low:8.00,high:14.00,unit:'SF'},'Plumbing Toilet':{low:450,high:900,unit:'EA'},'Water Heater':{low:900,high:2000,unit:'EA'},'Electrical Rough-In':{low:5.00,high:9.00,unit:'SF'},'Panel Upgrade 200A':{low:1800,high:4000,unit:'EA'},'Recessed Light':{low:120,high:220,unit:'EA'},'Insulation Batt':{low:1.50,high:3.00,unit:'SF'},'Shower Glass':{low:1400,high:3200,unit:'EA'},'Concrete Flatwork':{low:8.00,high:14.00,unit:'SF'},'Concrete Slab':{low:9.00,high:15.00,unit:'SF'},'Demo Interior':{low:3.00,high:6.00,unit:'SF'}};
var CMK={'Drywall L4':{low:2.00,high:3.50},'Drywall L5':{low:2.60,high:4.20},'Framing Labor':{low:4.50,high:8.50},'Framing+Material':{low:11.00,high:19.00},'Paint Interior':{low:2.25,high:4.25},'Paint Exterior':{low:3.25,high:5.75},'Tile Floor':{low:9.00,high:17.00},'Tile Wall':{low:13.00,high:25.00},'Hardwood Floor':{low:9.50,high:19.00},'LVP':{low:4.50,high:9.50},'Cabinets Stock':{low:170,high:300},'Cabinets Semi-Custom':{low:300,high:650},'Countertop Quartz':{low:85,high:160},'Plumbing Rough-In':{low:7.50,high:13.00},'Plumbing Toilet':{low:425,high:850},'Water Heater':{low:850,high:1900},'Electrical Rough-In':{low:4.75,high:8.75},'Panel Upgrade 200A':{low:1700,high:3800},'Recessed Light':{low:110,high:210},'Insulation Batt':{low:1.40,high:2.80},'Shower Glass':{low:1350,high:3100},'Concrete Flatwork':{low:7.50,high:13.50},'Concrete Slab':{low:8.50,high:14.50},'Demo Interior':{low:2.75,high:5.75}};
function gsa(key){var u=S.uploadedRates[key]||[],c=CMK[key],s=CSLB[key],tw=0,ws=0;u.forEach(function(r){ws+=r.rate*3;tw+=3;});if(c){ws+=((c.low+c.high)/2)*2;tw+=2;}if(s){ws+=((s.low+s.high)/2)*1;tw+=1;}return tw?ws/tw:null;}

function renderHome(){
  var lib=S.refLib.length,rates=Object.keys(S.uploadedRates).length;
  document.getElementById('libCount').textContent=lib?lib+' items in library':'';
  document.getElementById('rateCount').textContent=rates?'★ '+rates+' learned rates':'';
  var pend=S.projects.reduce(function(s,p){return s+((p.changeOrders||[]).filter(function(c){return !c.signedAt;}).length);},0);
  var pa=document.getElementById('pendingAlert');
  if(pend>0){pa.style.display='block';pa.innerHTML='⚠️ <strong style="color:#e67e22">'+pend+' Change Order'+(pend>1?'s':'')+' Pending Signature</strong>';}
  else pa.style.display='none';
  renderProjects();
}

function renderProjects(){
  var q=(document.getElementById('projSearch').value||'').toLowerCase();
  var fl=S.projects.filter(function(p){return(p.name+p.client+p.address).toLowerCase().includes(q);});
  var h='';
  if(!fl.length)h='<div class="card" style="text-align:center;color:#aaa;border:1px dashed #ccc"><div style="font-size:28px;margin-bottom:7px">🏗</div><div style="font-size:12px;font-weight:bold;color:#888">No projects yet — tap New Project to start</div></div>';
  fl.forEach(function(p){
    var et=(p.estimates||[]).reduce(function(s,e){return s+(e.grandTotal||0);},0);
    var ct=(p.changeOrders||[]).reduce(function(s,c){return s+(c.grandTotal||0);},0);
    var pc=(p.changeOrders||[]).filter(function(c){return !c.signedAt;}).length;
    h+='<div class="card" style="cursor:pointer" onclick="openProject(\''+p.id+'\')">'
      +'<div class="row" style="justify-content:space-between"><div>'
      +'<div style="font-size:13px;font-weight:bold">'+esc(p.name||'Unnamed Project')+'</div>'
      +'<div style="font-size:11px;color:#777;margin-top:1px">'+(p.client?esc(p.client)+' · ':'')+esc(p.address||'No address')+'</div>'
      +(pc>0?'<div style="font-size:9px;color:#e74c3c;font-weight:bold;margin-top:3px">⚠ '+pc+' CO pending</div>':'')
      +'</div>'
      +((et+ct)>0?'<div style="font-size:17px;font-family:monospace;font-weight:bold">'+fb(et+ct)+'</div>':'')
      +'</div></div>';
  });
  document.getElementById('projectList').innerHTML=h;
}

function newProject(){var p={id:uid(),name:'',address:'',client:'',clientPhone:'',created:tod(),estimates:[],changeOrders:[],receipts:[],fieldDocs:[]};S.projects.unshift(p);spj();S.activeProjId=p.id;showProject(true);}
function openProject(id){S.activeProjId=id;showProject(false);}

function showProject(editing){
  var p=getP();if(!p)return;
  showScreen('project',p.name||'Project');
  var info='';
  if(editing){
    info='<div class="card"><div class="grid2" style="margin-bottom:9px">'
      +'<div><div class="lbl">Project Name</div><input class="inp" id="pName" value="'+esc(p.name||'')+'" placeholder="Johnson Kitchen Remodel"/></div>'
      +'<div><div class="lbl">Address</div><input class="inp" id="pAddr" value="'+esc(p.address||'')+'" placeholder="123 Main St"/></div>'
      +'<div><div class="lbl">Client</div><input class="inp" id="pClient" value="'+esc(p.client||'')+'" placeholder="Client name"/></div>'
      +'<div><div class="lbl">Phone</div><input class="inp" id="pPhone" value="'+esc(p.clientPhone||'')+'" placeholder="(555) 000-0000"/></div>'
      +'</div><div class="row"><button class="btn btn-green" onclick="saveProjInfo()">Save</button><button class="btn btn-ghost" onclick="showProject(false)">Cancel</button></div></div>';
  } else {
    info='<div class="card"><div class="row" style="justify-content:space-between"><div>'
      +'<div style="font-size:14px;font-weight:bold">'+esc(p.name||'Unnamed')+'</div>'
      +(p.address?'<div style="font-size:11px;color:#666">'+esc(p.address)+'</div>':'')
      +(p.client?'<div style="font-size:11px;color:#666">'+esc(p.client)+(p.clientPhone?' · '+esc(p.clientPhone):'')+'</div>':'')
      +'</div><div class="row" style="gap:6px">'
      +'<button class="btn btn-sec" style="padding:6px 12px;font-size:11px" onclick="showProject(true)">Edit</button>'
      +'<button class="btn btn-ghost" style="padding:6px 10px;font-size:10px;color:#e74c3c;border-color:#e74c3c" onclick="delProj()">Delete</button>'
      +'</div></div></div>';
  }
  document.getElementById('projInfo').innerHTML=info;
  var btns=[{icon:'📋',label:'Estimate',color:'#2980b9',fn:'newDoc("estimate")'},
    {icon:'🔄',label:'Change Order',color:'#e67e22',fn:'newDoc("co")'},
    {icon:'📐',label:'ArcSite',color:'#e67e22',fn:'showArc()'},
    {icon:'📷',label:'Field Docs',color:'#8e44ad',fn:'showFD()'},
    {icon:'🧾',label:'Receipt',color:'#e74c3c',fn:'showScreen("receipt","Receipt")'}];
  document.getElementById('projActions').innerHTML=btns.map(function(b){
    return '<button onclick="'+b.fn+'" style="padding:11px 6px;border:2px solid '+b.color+'33;border-radius:3px;background:'+b.color+'0a;cursor:pointer;font-family:Arial;text-align:center;width:100%">'
      +'<div style="font-size:18px;margin-bottom:2px">'+b.icon+'</div>'
      +'<div style="font-size:10px;font-weight:bold;color:'+b.color+'">'+b.label+'</div></button>';
  }).join('');
  renderPDocs();
}

function saveProjInfo(){var p=getP();if(!p)return;p.name=document.getElementById('pName').value;p.address=document.getElementById('pAddr').value;p.client=document.getElementById('pClient').value;p.clientPhone=document.getElementById('pPhone').value;spj();showProject(false);toast('Saved');}
function delProj(){if(!confirm('Delete?'))return;S.projects=S.projects.filter(function(p){return p.id!==S.activeProjId;});spj();showTab('home');}

function renderPDocs(){
  var p=getP();if(!p)return;
  var h='';
  if((p.estimates||[]).length){h+='<div class="sec-title">Estimates</div>';p.estimates.forEach(function(e){h+='<div class="card" style="cursor:pointer;display:flex;justify-content:space-between" onclick="openDoc(\'estimate\',\''+e.id+'\')">'+'<div><div style="font-size:12px;font-weight:bold">'+esc(e.title||'Estimate')+'</div><div style="font-size:10px;color:#888">'+e.date+'</div></div><div style="font-size:14px;font-family:monospace;font-weight:bold">'+fb(e.grandTotal||0)+'</div></div>';});}
  if((p.changeOrders||[]).length){h+='<div class="sec-title">Change Orders</div>';p.changeOrders.forEach(function(co){h+='<div class="card" style="cursor:pointer;border:2px solid '+(co.signedAt?'#27ae60':'#e67e22')+'" onclick="openDoc(\'co\',\''+co.id+'\')">'+'<div class="row" style="justify-content:space-between"><div><div style="font-size:12px;font-weight:bold">'+esc(co.title||'Change Order')+' <span style="font-size:9px;padding:2px 6px;border-radius:10px;background:'+(co.signedAt?'#e8f5e9':'#fff3e0')+';color:'+(co.signedAt?'#27ae60':'#e67e22')+'">'+(co.signedAt?'APPROVED':'Pending')+'</span></div><div style="font-size:10px;color:#888">'+co.date+'</div></div><div style="font-size:14px;font-family:monospace;font-weight:bold;color:'+(co.signedAt?'#27ae60':'#e67e22')+'">'+fb(co.grandTotal||0)+'</div></div></div>';});}
  if((p.fieldDocs||[]).length){h+='<div class="sec-title">Field Photos ('+p.fieldDocs.length+')</div><div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">';p.fieldDocs.slice(0,6).forEach(function(d){h+='<div style="flex-shrink:0;width:80px;cursor:pointer" onclick="showFD()">'+(d.imageData?'<img src="'+d.imageData+'" style="width:80px;height:60px;object-fit:cover;border-radius:3px;border:2px solid #eee;display:block"/>'  :'<div style="width:80px;height:60px;background:#f0e8ff;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:18px">📷</div>')+'<div style="font-size:8px;color:#666;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(d.title||'Photo')+'</div></div>';});h+='</div>';}
  if((p.receipts||[]).length){h+='<div class="sec-title">Receipts</div>';p.receipts.forEach(function(r){h+='<div class="card"><div class="row" style="justify-content:space-between"><div><div style="font-size:12px;font-weight:bold">'+esc(r.vendor)+'</div><div style="font-size:10px;color:#888">'+r.date+'</div></div><div style="text-align:right"><div style="font-size:10px;color:#aaa">Cost: '+fb(r.cost)+'</div><div style="font-size:13px;font-family:monospace;font-weight:bold;color:#e74c3c">Bill: '+fb(r.billed)+'</div></div></div></div>';});}
  document.getElementById('projDocs').innerHTML=h;
}

var PAY=[{id:'p3',label:'3-Pay',rows:[{label:'Deposit — Upon Signing',pct:33},{label:'Progress Draw — Midpoint',pct:33},{label:'Final — Completion',pct:34}]},{id:'p4',label:'4-Pay',rows:[{label:'Deposit — Upon Signing',pct:25},{label:'Draw 1 — Framing',pct:25},{label:'Draw 2 — Drywall',pct:25},{label:'Final — Completion',pct:25}]},{id:'p5',label:'5-Pay',rows:[{label:'Deposit',pct:20},{label:'Draw 1 — Demo',pct:20},{label:'Draw 2 — Framing',pct:20},{label:'Draw 3 — Finishes',pct:20},{label:'Final',pct:20}]}];
var TRADES=['Demolition','Concrete','Framing','Drywall','Insulation','Cabinets','Countertops','Plumbing','Electrical','Painting','Flooring','Tile','Shower Glass','General Labor','Other'];

function newDoc(type){S.activeDocType=type;S.activeDocId=null;var p=getP();if(!p)return;var n=type==='co'?(p.changeOrders||[]).length+1:(p.estimates||[]).length+1;S.docLines=[{id:uid(),trade:'',description:'',qty:'',unit:'SF',unitPrice:'',notes:'',isMatl:false}];S.docMarkup=25;S.docPaySched='p3';renderDoc();showScreen('doc',type==='co'?'Change Order #'+n:'Estimate #'+n);}
function openDoc(type,id){S.activeDocType=type;S.activeDocId=id;var p=getP();if(!p)return;var doc=type==='co'?(p.changeOrders||[]).find(function(c){return c.id===id;}):(p.estimates||[]).find(function(e){return e.id===id;});if(!doc)return;S.docLines=(doc.lines||[]).map(function(l){return Object.assign({},l);});S.docMarkup=doc.matMarkup||25;S.docPaySched=doc.paySched||'p3';renderDoc(doc);showScreen('doc',type==='co'?'Change Order':'Estimate');}

function cLines(){return S.docLines.map(function(l){var q=parseFloat(l.qty)||0,pr=parseFloat(l.unitPrice)||0,r=q*pr,m=l.isMatl?r*(S.docMarkup/100):0;return Object.assign({},l,{qty:q,price:pr,raw:r,mamt:m,total:r+m});});}
function cTots(cl){return{sub:cl.reduce(function(s,l){return s+l.raw;},0),mat:cl.reduce(function(s,l){return s+l.mamt;},0),grand:cl.reduce(function(s,l){return s+l.total;},0)};}

function getDoc(){var p=getP();if(!p||!S.activeDocId)return null;return S.activeDocType==='co'?(p.changeOrders||[]).find(function(c){return c.id===S.activeDocId;}):(p.estimates||[]).find(function(e){return e.id===S.activeDocId;});}

    +'<div>Trade</div><div>Description</div><div style="text-align:right">Qty</div><div style="text-align:center">Unit</div><div style="text-align:right">Price</div><div style="text-align:right">Amount</div><div style="text-align:center;font-size:7px">MAT</div></div>';

  if(!isCO){h+='<div style="padding:9px 10px;border-bottom:1px solid #eee"><div class="row" style="margin-bottom:7px;flex-wrap:wrap"><span style="font-size:9px;font-weight:bold;letter-spacing:1px;color:#555;text-transform:uppercase">Payment Schedule:</span>'+PAY.map(function(p){return'<button onclick="setPS(\''+p.id+'\')" class="btn" style="padding:4px 9px;font-size:10px;font-weight:bold;border:2px solid '+(S.docPaySched===p.id?'#000':'#ddd')+';background:'+(S.docPaySched===p.id?'#000':'#fff')+';color:'+(S.docPaySched===p.id?'#fff':'#555')+'">'+p.label+'</button>';}).join('')+'</div><div id="payRows">'+rPay(tot.grand)+'</div></div>';}
  h+='<div style="padding:9px 10px"><div class="grid2"><div><div class="lbl">Notes</div><textarea id="dNotes" style="width:100%;border:1px solid #ccc;padding:7px;font-size:11px;border-radius:3px;min-height:55px;resize:vertical">'+esc(notes)+'</textarea></div><div><div class="lbl">Warranty</div><textarea id="dWarr" style="width:100%;border:1px solid #ccc;padding:7px;font-size:10px;border-radius:3px;min-height:55px;resize:vertical">'+esc(warr)+'</textarea></div></div></div></div>';
  if(isCO&&!sa)h+='<div id="sigPanel" style="display:none"><div class="card" style="border:3px solid #27ae60"><div style="font-size:13px;font-weight:bold;margin-bottom:4px">✍ Client Signature</div><div style="font-size:11px;color:#555;margin-bottom:9px">By signing, client approves this change order.</div><canvas id="sigC" class="sig-canvas" width="560" height="130"></canvas><div style="font-size:10px;color:#aaa;text-align:center;margin-top:3px">Sign with finger or mouse</div><div class="row" style="margin-top:10px"><button class="btn btn-green" onclick="confSig()">✓ Confirm</button><button class="btn btn-ghost" onclick="clrSig()">Clear</button><button class="btn btn-ghost" onclick="document.getElementById(\'sigPanel\').style.display=\'none\'">Cancel</button></div></div></div>';

function rTots(t){return[{l:'Subtotal',v:fb(t.sub),c:'#555'},{l:'Mat +'+S.docMarkup+'%',v:fb(t.mat),c:'#e74c3c'},{l:'Total',v:fb(t.grand),c:'#000',b:true}].map(function(x,i){return'<div style="padding:11px 10px;border-right:'+(i<2?'1px solid #eee':'none')+';border-top:3px solid '+(x.b?'#000':'#eee')+'"><div style="font-size:9px;color:#999;letter-spacing:.8px;text-transform:uppercase;margin-bottom:3px">'+x.l+'</div><div style="font-size:'+(x.b?21:15)+'px;font-family:monospace;font-weight:'+(x.b?'bold':'normal')+';color:'+x.c+'">'+x.v+'</div></div>';}).join('');}
function rPay(g){var s=PAY.find(function(p){return p.id===S.docPaySched;});if(!s)return'';return s.rows.map(function(r,i){return'<div style="display:flex;justify-content:space-between;padding:5px 7px;background:'+(i%2===0?'#fafafa':'#fff')+';border-radius:2px;margin-bottom:2px"><div class="row" style="gap:7px"><div style="width:16px;height:16px;border-radius:50%;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:bold">'+(i+1)+'</div><span style="font-size:11px">'+r.label+'</span></div><span style="font-family:monospace;font-weight:bold;font-size:11px">'+fb(g*(r.pct/100))+' <span style="font-size:9px;color:#aaa">('+r.pct+'%)</span></span></div>';}).join('');}
function updTots(){var cl=cLines(),t=cTots(cl);var tr=document.getElementById('totsRow');if(tr)tr.innerHTML=rTots(t);var pr=document.getElementById('payRows');if(pr)pr.innerHTML=rPay(t.grand);}
function updL(id,f,v){S.docLines=S.docLines.map(function(l){if(l.id!==id)return l;var u=Object.assign({},l);if(f==='isMatl')u.isMatl=!!v;else u[f]=v;return u;});updTots();}
function addLine(){S.docLines.push({id:uid(),trade:'',description:'',qty:'',unit:'SF',unitPrice:'',notes:'',isMatl:false});renderDoc(getDoc());}
function rmBlanks(){S.docLines=S.docLines.filter(function(l){return l.description||l.unitPrice;});renderDoc(getDoc());}
function setPS(id){S.docPaySched=id;renderDoc(getDoc());}

var dvRec=null,dvOn=false;
function togDV(){if(dvOn){dvRec&&dvRec.stop();dvOn=false;document.getElementById('dVBtn').textContent='🎤 Speak';return;}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported','err');return;}var rec=new SR();rec.continuous=true;rec.interimResults=true;rec.lang='en-US';var fin='';rec.onresult=function(e){var tmp='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';else tmp+=e.results[i][0].transcript;}document.getElementById('dVoice').value=fin+tmp;};rec.onerror=function(){dvOn=false;document.getElementById('dVBtn').textContent='🎤 Speak';};rec.onend=function(){dvOn=false;document.getElementById('dVBtn').textContent='🎤 Speak';};rec.start();dvRec=rec;dvOn=true;document.getElementById('dVBtn').textContent='⏹ Stop';}

async function autoFill(){var t=document.getElementById('dVoice').value;if(!t.trim()){toast('Type or speak first','err');return;}busy(true,'Reading description...');try{var r=JSON.parse(await callAI([{role:'user',content:'Construction estimating for A&M Construction LA. Extract line items from: "'+t+'". Return ONLY JSON array: [{"trade":"","description":"","qty":null,"unit":"SF","unitPrice":null,"notes":"","isMatl":false}]'}]));if(Array.isArray(r)&&r.length){r.forEach(function(i){S.docLines.push({id:uid(),trade:i.trade||'',description:i.description||'',qty:i.qty||'',unit:i.unit||'SF',unitPrice:i.unitPrice||'',notes:i.notes||'',isMatl:i.isMatl||false});});toast(r.length+' items added');renderDoc(getDoc());}}catch(e){toast('Error','err');}busy(false);}

async function impFile(inp){var file=inp.files[0];if(!file)return;busy(true,'Reading file...');try{var pr,msgs;var prompt='Extract construction prices. Return ONLY JSON: {"prices":[{"trade_key":"name","rate":0,"unit":"SF","includes":"labor/material","notes":""}]}';if(file.type.startsWith('image/')){var b64=await tb64(file);msgs=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:prompt}]}];}else{var txt=await file.text();msgs=[{role:'user',content:prompt+' CONTENT: '+txt}];}var r=JSON.parse(await callAI(msgs));if(r.prices&&r.prices.length){r.prices.forEach(function(p){S.docLines.push({id:uid(),trade:'',description:p.trade_key||'',qty:'',unit:p.unit||'SF',unitPrice:p.rate||'',notes:'',isMatl:false});});toast(r.prices.length+' items imported');renderDoc(getDoc());}}catch(e){toast('Import failed','err');}busy(false);inp.value='';}

function saveDoc(signed,sigImg){var p=getP();if(!p)return;var cl=cLines(),tot=cTots(cl);var title=document.getElementById('dTitle')?document.getElementById('dTitle').value:'';var notes=document.getElementById('dNotes')?document.getElementById('dNotes').value:'';var warr=document.getElementById('dWarr')?document.getElementById('dWarr').value:'';var ed=getDoc();var doc={id:ed?ed.id:uid(),title:title,lines:S.docLines,matMarkup:S.docMarkup,paySched:S.docPaySched,notes:notes,warranty:warr,date:ed?ed.date:tod(),grandTotal:tot.grand,signedAt:signed?tod():(ed?ed.signedAt:null),sigData:sigImg||(ed?ed.sigData:null)};if(S.activeDocType==='co'){if(!p.changeOrders)p.changeOrders=[];if(ed)p.changeOrders=p.changeOrders.map(function(c){return c.id===doc.id?doc:c;});else p.changeOrders.push(doc);}else{if(!p.estimates)p.estimates=[];if(ed)p.estimates=p.estimates.map(function(e){return e.id===doc.id?doc:e;});else p.estimates.push(doc);}S.activeDocId=doc.id;spj();toast('Saved!');}

function expKnowify(){saveDoc();var rows=[['Phase','Category','Description','Qty','Unit','Unit Cost','Markup %']];S.docLines.forEach(function(l){if(!l.description)return;rows.push(['General',l.isMatl?'Material':'Labor',l.description,parseFloat(l.qty)||0,l.unit,Number(parseFloat(l.unitPrice)||0).toFixed(2),S.docMarkup]);});var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');var p=getP();var blob=new Blob([csv],{type:'text/csv'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download=(p?p.name:'AM').replace(/\s+/g,'_')+'_Knowify.csv';a.click();URL.revokeObjectURL(url);toast('Downloaded — import into Knowify Plan & Track');}

var sigDrw=false;
function initSig(){var c=document.getElementById('sigC');if(!c)return;c.addEventListener('mousedown',function(e){sigDrw=true;dSig(e,c);});c.addEventListener('mousemove',function(e){if(sigDrw)dSig(e,c);});c.addEventListener('mouseup',function(){sigDrw=false;});c.addEventListener('mouseleave',function(){sigDrw=false;});c.addEventListener('touchstart',function(e){sigDrw=true;dSig(e,c);e.preventDefault();},{passive:false});c.addEventListener('touchmove',function(e){if(sigDrw)dSig(e,c);e.preventDefault();},{passive:false});c.addEventListener('touchend',function(){sigDrw=false;});}
function dSig(e,c){var ctx=c.getContext('2d'),r=c.getBoundingClientRect();var cx=e.touches?e.touches[0].clientX:e.clientX,cy=e.touches?e.touches[0].clientY:e.clientY;var x=(cx-r.left)*(c.width/r.width),y=(cy-r.top)*(c.height/r.height);if(e.type==='mousedown'||e.type==='touchstart'){ctx.beginPath();ctx.moveTo(x,y);}else{ctx.lineTo(x,y);ctx.strokeStyle='#000';ctx.lineWidth=2.5;ctx.stroke();}}
function clrSig(){var c=document.getElementById('sigC');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}
function showSig(){var p=document.getElementById('sigPanel');if(p)p.style.display='block';}
function confSig(){var c=document.getElementById('sigC');if(!c){toast('Sign first','err');return;}var sig=c.toDataURL('image/png');saveDoc(true,sig);toast('Signed and saved!');openDoc(S.activeDocType,S.activeDocId);}

function showFD(){renderFD();showScreen('fielddocs','Field Docs');}
var fdVR=null,fdVOn=false,fdImg=null,fdType='image/jpeg';

function renderFD(){var p=getP();if(!p)return;var docs=p.fieldDocs||[];var h='<div class="row" style="justify-content:space-between;margin-bottom:10px"><div style="font-size:13px;font-weight:bold">📷 Field Docs — '+esc(p.name||'')+'</div><button class="btn btn-green" onclick="startFD()">+ Add Photo</button></div><div id="fdAdd" style="display:none"></div>';var tags=['All','Before','After','Issue / Problem','Inspection','Materials','Progress','Safety','General'];h+='<div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap">'+tags.map(function(t){return'<button onclick="filtFD(\''+t+'\')" style="padding:3px 9px;border-radius:10px;border:none;cursor:pointer;font-family:Arial;font-size:9px;font-weight:bold;background:'+( t==='All'?'#8e44ad':'#e8e8e8')+';color:'+(t==='All'?'#fff':'#555');}).join('')+'</div>';if(!docs.length)h+='<div class="card" style="text-align:center;color:#aaa;border:1px dashed #ccc"><div style="font-size:24px;margin-bottom:5px">📷</div><div style="font-size:11px;font-weight:bold;color:#888">No field photos yet</div></div>';else h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:9px" id="fdGrid">'+docs.map(function(d){return'<div style="background:#fff;border:1px solid #ddd;border-radius:3px;overflow:hidden;cursor:pointer" onclick="viewFD(\''+d.id+'\')">'+(d.imageData?'<img src="'+d.imageData+'" style="width:100%;height:120px;object-fit:cover;display:block"/>':'<div style="width:100%;height:120px;background:#f0e8ff;display:flex;align-items:center;justify-content:center;font-size:24px">📷</div>')+'<div style="padding:7px 8px"><div style="font-size:10px;font-weight:bold">'+esc(d.title||'Photo')+'</div><div style="display:flex;justify-content:space-between;margin-top:2px"><span style="font-size:8px;padding:1px 5px;border-radius:10px;background:#f0e8ff;color:#8e44ad;font-weight:bold">'+esc(d.tag||'General')+'</span><span style="font-size:8px;color:#aaa">'+d.date+'</span></div></div></div>';}).join('')+'</div> function renderUpRes(){var r=upRes;var h='<div class="card" style="border:2px solid #27ae60"><div style="font-size:13px;font-weight:bold;margin-bottom:4px">✅ Found '+(r.prices||[]).length+' price'+((r.prices||[]).length!==1?'s':'')+'</div>'+(r.summary?'<div style="font-size:11px;color:#666;margin-bottom:9px">'+esc(r.summary)+'</div>':'')+(r.contractor_name?'<div style="padding:6px 9px;background:#f0f7ff;border-radius:2px;margin-bottom:8px;font-size:11px">👤 <strong>'+esc(r.contractor_name)+'</strong>'+(r.contractor_phone?' · '+esc(r.contractor_phone):'')+(r.location?' · '+esc(r.location):'')+'</div>':'')+(r.prices||[]).map(function(p,i){return'<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 9px;background:'+(i%2===0?'#fafafa':'#fff')+';border-radius:2px;margin-bottom:2px"><div><div style="font-size:11px;font-weight:bold;color:#111">'+esc(p.trade_key||'')+'</div>'+(p.includes?'<div style="font-size:9px;color:#888">'+esc(p.includes)+'</div>':'')+'</div><div style="font-size:15px;font-family:monospace;font-weight:bold;color:#27ae60;margin-left:11px">'+fd(p.rate)+'<span style="font-size:9px;font-weight:normal;color:#aaa">/'+(p.unit||'SF')+'</span></div></div>';}).join('')+'<div class="row" style="margin-top:11px;flex-wrap:wrap">'+(!upSvd?'<button class="btn btn-green" onclick="saveUp()">💾 Save to Library</button>':'<div style="padding:9px 13px;background:#e8f5e9;border:1px solid #27ae60;border-radius:3px;font-size:11px;font-weight:bold;color:#27ae60">✓ Saved</div>')+'<button class="btn btn-sec" onclick="resetUp()">Upload Another</button>'+(upSvd?'<button class="btn btn-ghost" onclick="showTab(\'library\')">View Library →</button>':'')+'</div></div>';document.getElementById('uploadContent').innerHTML=h;}

function togUV(){if(upVOn){upVR&&upVR.stop();upVOn=false;var b=document.getElementById('upVBtn');if(b)b.textContent='🎤 Speak';return;}var SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){toast('Voice not supported','err');return;}var rec=new SR();rec.continuous=true;rec.interimResults=true;rec.lang='en-US';var fin='';rec.onresult=function(e){var tmp='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)fin+=e.results[i][0].transcript+' ';else tmp+=e.results[i][0].transcript;}var el=document.getElementById('upV');if(el)el.value=fin+tmp;};rec.onerror=function(){upVOn=false;var b=document.getElementById('upVBtn');if(b)b.textContent='🎤 Speak';};rec.onend=function(){upVOn=false;var b=document.getElementById('upVBtn');if(b)b.textContent='🎤 Speak';};rec.start();upVR=rec;upVOn=true;document.getElementById('upVBtn').textContent='⏹ Stop';}

async function extPrices(content,isImg,mt,label){busy(true,'Reading '+label+'...');try{var prompt='Extract construction prices for A&M Construction LA. Return ONLY JSON: {"contractor_name":null,"contractor_phone":null,"location":null,"summary":"one sentence","prices":[{"trade_key":"trade name","rate":0,"unit":"SF","includes":"labor/material","notes":""}],"data_quality":"high/medium/low"}';var msgs;if(isImg)msgs=[{role:'user',content:[{type:'image',source:{type:'base64',media_type:mt,data:content}},{type:'text',text:prompt}]}];else msgs=[{role:'user',content:prompt+' SOURCE: '+label+' CONTENT: '+content}];return JSON.parse(await callAI(msgs));}catch(e){toast('Could not read','err');return null;}finally{busy(false);}}

async function hUF(inp){var file=inp.files[0];if(!file)return;var src=USR.find(function(s){return s.id===upSrc;});var r;if(file.type.startsWith('image/')){var b64=await tb64(file);r=await extPrices(b64,true,file.type,src?src.label:'photo');}else{var txt=await file.text();r=await extPrices(txt,false,null,src?src.label:'file');}if(r){upRes=r;renderUpRes();}inp.value='';}
async function hUP(){var el=document.getElementById('upP');if(!el||!el.value.trim()){toast('Paste something first','err');return;}var src=USR.find(function(s){return s.id===upSrc;});var r=await extPrices(el.value,false,null,src?src.label:'pasted text');if(r){upRes=r;renderUpRes();}}
async function hUV(){var el=document.getElementById('upV');if(!el||!el.value.trim()){toast('Speak or type first','err');return;}var r=await extPrices(el.value,false,null,'voice note');if(r){upRes=r;renderUpRes();}}
async function saveUp(){var src=USR.find(function(s){return s.id===upSrc;});if(!upRes||!upRes.prices||!upRes.prices.length){toast('No prices found','err');return;}upRes.prices.forEach(function(p){if(!p.trade_key||!p.rate)return;if(!S.uploadedRates[p.trade_key])S.uploadedRates[p.trade_key]=[];S.uploadedRates[p.trade_key].push({rate:p.rate,unit:p.unit||'SF',source:upRes.contractor_name||(src?src.label:'upload'),date:tod()});if(S.uploadedRates[p.trade_key].length>20)S.uploadedRates[p.trade_key]=S.uploadedRates[p.trade_key].slice(-20);});srj();S.refLib.unshift({id:uid(),date:tod(),label:src?src.label:'upload',contractor:upRes.contractor_name||null,phone:upRes.contractor_phone||null,location:upRes.location||null,summary:upRes.summary||'',count:upRes.prices.length,quality:upRes.data_quality||'medium',prices:upRes.prices});if(S.refLib.length>300)S.refLib=S.refLib.slice(0,300);slj();upSvd=true;toast('✓ '+upRes.prices.length+' price'+(upRes.prices.length!==1?'s':'')+' saved — averages updated');renderUpRes();}

function renderLibrary(){var search=(document.getElementById('lSrch')?document.getElementById('lSrch').value||'':'').toLowerCase();var tu=Object.values(S.uploadedRates).reduce(function(s,a){return s+a.length;},0);var h='<div class="row" style="justify-content:space-between;align-items:flex-start;margin-bottom:11px;flex-wrap:wrap;gap:8px"><div><div style="font-size:14px;font-weight:bold">📚 Price Library</div><div style="font-size:10px;color:#888;margin-top:1px">'+tu+' uploaded rates · auto-calculates combined average</div></div><button class="btn btn-green" onclick="showTab(\'upload\')">+ Add New</button></div><div class="card"><div class="grid2" style="gap:7px">'+[{c:'#27ae60',i:'⚡',l:'Your Uploads',w:'3×',d:'Real field data. Highest weight.'},{c:'#2980b9',i:'🔬',l:'Claude Research',w:'2×',d:'LA/OC market research.'},{c:'#8e44ad',i:'📋',l:'CSLB / Union',w:'1×',d:'Board prevailing wage.'}].map(function(x){return'<div style="padding:8px 10px;border-left:4px solid '+x.c+';background:'+x.c+'08;border-radius:2px"><div class="row" style="gap:5px;margin-bottom:3px"><span style="font-size:12px">'+x.i+'</span><span style="font-size:10px;font-weight:bold;color:'+x.c+'">'+x.l+'</span><span style="font-size:8px;padding:1px 5px;background:'+x.c+';color:#fff;border-radius:10px;font-weight:bold">'+x.w+'</span></div><div style="font-size:9px;color:#666;line-height:1.5">'+x.d+'</div></div>';}).join('')+'</div></div><input class="inp" id="lSrch" placeholder="Search trades..." style="margin-bottom:9px" oninput="renderLibrary()"/><div style="display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:4px;padding:6px 10px;background:#000;color:#fff;border-radius:3px 3px 0 0;font-size:8px;font-weight:bold;letter-spacing:.8px;text-transform:uppercase"><div>Trade</div><div style="text-align:center;color:#5dade2">⚡ Your Avg</div><div style="text-align:center;color:#58d68d">🎯 Combined</div><div style="text-align:center;color:#bb8fce">📋 CSLB</div></div>';Object.entries(CSLB).filter(function(e){return !search||e[0].toLowerCase().includes(search);}).forEach(function(en,i){var key=en[0],cslb=en[1];var ups=S.uploadedRates[key]||[];var sa=gsa(key);var ya=ups.length?ups.reduce(function(s,r){return s+r.rate;},0)/ups.length:null;h+='<div style="display:grid;grid-template-columns:1.8fr 1fr 1fr 1fr;gap:4px;padding:8px 10px;background:'+(i%2===0?'#fff':'#fafaf8')+';border-bottom:1px solid #eee;align-items:center;border-left:3px solid '+(ups.length>0?'#27ae60':'#eee')+'"><div><div style="font-size:10px;font-weight:bold;color:#111">'+key+'</div>'+(ups.length>0?'<div style="font-size:7px;color:#27ae60">'+ups.length+' upload'+(ups.length>1?'s':'')+'</div>':'')+'</div><div style="text-align:center">'+(ya?'<div style="font-size:14px;font-family:monospace;font-weight:bold;color:#2980b9">'+fd(ya)+'</div>':'<div style="font-size:9px;color:#ccc;font-style:italic">None</div>')+'</div><div style="text-align:center">'+(sa?'<div style="font-size:18px;font-family:monospace;font-weight:bold;color:'+(ups.length>0?'#27ae60':'#f39c12')+'">'+fd(sa)+'</div>':'<div style="font-size:9px;color:#ccc">—</div>')+'</div><div style="text-align:center"><div style="font-size:10px;font-family:monospace;color:#8e44ad">'+fd(cslb.low)+'–'+fd(cslb.high)+'</div><div style="font-size:7px;color:#aaa">'+cslb.unit+'</div></div></div>';});h+='<div style="font-size:8px;color:#aaa;text-align:center;margin-top:7px;line-height:1.6">Combined = your uploads (3×) + Claude research (2×) + CSLB/Union (1×)</div>';if(S.refLib.length){h+='<div style="margin-top:14px"><div class="sec-title">Upload History ('+S.refLib.length+')</div>'+S.refLib.map(function(e){var src=USR.find(function(s){return s.label===e.label;});return'<div class="card"><div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:6px"><div><div class="row" style="gap:6px;margin-bottom:2px"><span style="font-size:12px">'+(src?src.icon:'📄')+'</span><span style="font-size:11px;font-weight:bold">'+esc(e.contractor||e.label)+'</span>'+(e.location?'<span style="font-size:8px;padding:2px 5px;border-radius:10px;background:#f0f0f0;color:#555">'+esc(e.location)+'</span>':'')+'</div>'+(e.summary?'<div style="font-size:10px;color:#666">'+esc(e.summary)+'</div>':'')+'<div style="font-size:8px;color:#aaa">'+e.date+' · '+e.count+' price'+(e.count!==1?'s':'')+'</div></div><button class="btn btn-ghost" style="padding:3px 7px;font-size:9px;color:#e74c3c;border-color:#e74c3c" onclick="delLib(\''+e.id+'\')">Delete</button></div>'+(e.prices&&e.prices.length?'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:6px">'+e.prices.map(function(p){return'<div style="padding:2px 7px;background:#f5f5f3;border-radius:10px;font-size:8px;color:#333">'+(p.trade_key||'').split(' ')[0]+' · <strong style="color:#27ae60">'+fd(p.rate)+'/'+(p.unit||'SF')+'</strong></div>';}).join('')+'</div>':'')+'</div>';}).join('')+'</div>';}document.getElementById('libraryContent').innerHTML=h;}
